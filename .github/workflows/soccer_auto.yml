name: Soccer AI Predictor

on:
  schedule:
    # ⏰ 매일 한국 시간 아침 8시에 자동 실행 (UTC 기준 23시)
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 로봇이 index.html 파일을 저장할 수 있도록 권한 부여

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Soccer AI Engine
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python analyze.py

      - name: Save Visual Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "📊 오늘자 AI 축구 시각화 리포트 업데이트" || echo "변동사항 없음"
          git push
