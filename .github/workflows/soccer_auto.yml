name: Soccer AI Automation

on:
  workflow_dispatch: # 수동 실행 버튼 활성화
  schedule:
    - cron: '0 23 * * *' # 한국 시간 매일 아침 8시 자동 가동

jobs:
  analyze-soccer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Soccer AI Engine
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}  # <--- 이 부분이 핵심! (파이썬에게 열쇠 전달)
        run: |
          python analyze.py
